    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="YordamchiAI — an AI-powered learning platform for students and teachers. Get instant answers, track attendance, and manage lessons. Powered by Gemini 2.5 Flash. Available in Uzbek, Russian, and English." />
    <meta name="keywords" content="AI education, learning platform, Uzbekistan, students, teachers, Gemini AI, online school" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yordamchi-ai-alpha.vercel.app" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="The AI assistant built for students and teachers. Powered by Gemini 2.5 Flash." />
    <!-- FOUC guard: paint the brand background BEFORE the CSS bundle loads (no white flash) -->
    <style>
      html { background-color: #0A0D1F; color-scheme: dark; }
      html:not(.dark) { background-color: #FCFDFE; color-scheme: light; }
      body { margin: 0; }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
